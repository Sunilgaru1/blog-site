{% extends 'base.html' %}

{% block title %}Blog Detail{% endblock %}

{% block body %}

<div class="container">

    <h1>{{ blog.title }}</h1>

    <p style="color:gray;">{{ blog.created }}</p>

    <p style="margin-top:20px;">
        {{ blog.content }}
    </p>

</div>

<div style="margin-top:30px; display:flex; gap:15px;">

    <a href="{% url 'edit_blog' blog.id %}"
       style="background:#2563eb; color:white; padding:10px 18px; text-decoration:none; border-radius:6px;">
        Edit
    </a>

    <a href="{% url 'delete_blog' blog.id %}"
       style="background:#dc2626; color:white; padding:10px 18px; text-decoration:none; border-radius:6px;">
        Delete
    </a>

    <a href="{% url 'blog_list' %}"
       style="background:#6b7280; color:white; padding:10px 18px; text-decoration:none; border-radius:6px;">
        Back
    </a>

</div>

{% endblock %}
