{% extends 'base.html' %}

{% block title %}
Delete Blog
{% endblock %}

{% block body %}

<div style="max-width:600px; margin:50px auto; text-align:center;">

    <h1>Delete Blog</h1>

    <p>
        Are you sure you want to delete
        <strong>{{ blog.title }}</strong> ?
    </p>

    <form method="POST">
        {% csrf_token %}

        <button type="submit">
            Yes, Delete
        </button>
    </form>

    <br>

    <a href="{% url 'blog_detail' blog.id %}">
        Cancel
    </a>

</div>

{% endblock %}
